<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrola sudého/lichého čísla</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 50px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        #result.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
            display: block;
        }

        #result.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history {
            margin-top: 30px;
            text-align: left;
        }

        .history h3 {
            color: #333;
            margin-bottom: 10px;
        }

        ul {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        li {
            padding: 8px 12px;
            background: #f8f9fa;
            margin: 5px 0;
            border-radius: 5px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Kontrola Čísla</h1>
        <p class="subtitle">Zjisti, zda je číslo sudé nebo liché</p>
        
        <div class="input-group">
            <input 
                type="number" 
                id="cislo" 
                placeholder="Zadej číslo..." 
                autocomplete="off"
            >
            <button onclick="kontrola()">Zkontroluj</button>
        </div>

        <div id="result"></div>

        <div class="history">
            <h3>Poslední kontroly:</h3>
            <ul id="historia"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
