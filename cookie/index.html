<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Cookie Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hra-container">
        
        <div class="hlavni-panel">
            <h1>Cookie Clicker</h1>
            <div class="skore-box">
                Upečeno sušenek: <span id="skore">0</span>
            </div>
            
            <div id="btn-susenka" class="cookie-klik">🍪</div>

            <div class="akce-pod-susenkou">
                <button id="btn-zlata" class="shop-item zlata-karta">✨ Zlatá sušenka (Risk 50/50) ✨</button>
                <p id="vysledek-zlata" class="vysledek-text"></p>
            </div>
        </div>

        <div id="obchod-sekce" class="bocni-panel skryty">
            <h3>Obchod s upgrady</h3>
            
            <button id="btn-babicka" class="shop-item">
                <span class="nazev"> Najmout Babičku</span>
                <span class="cena">Cena: 10 sušenek</span>
            </button>
            
            <button id="btn-tovarna" class="shop-item">
                <span class="nazev"> Koupit Továrnu</span>
                <span class="cena">Cena: 50 sušenek</span>
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
